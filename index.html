<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deoghar Express - Deoghar se Dubai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Deoghar se Dubai 🇦🇪</h1>
            <p class="subheading">WhatsApp Bot for 35 Lakh Indians in UAE</p>
        </header>

        <main>
            <div class="features">
                <div class="feature">💰 Salary check</div>
                <div class="feature">🇮🇳 Send money to India</div>
                <div class="feature">📅 Visa expiry</div>
                <div class="feature">👨‍👩‍👧‍👦 Talk to family</div>
            </div>

            <div class="waitlist">
                <input type="email" id="email" placeholder="Apna email daalo" required>
                <button onclick="joinWaitlist()">Waitlist Join Karo</button>
                <p id="message"></p>
            </div>
        </main>

        <footer>
            <p>Launching 18 Nov 2026 | Day 28/100 | Made in Deoghar</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
